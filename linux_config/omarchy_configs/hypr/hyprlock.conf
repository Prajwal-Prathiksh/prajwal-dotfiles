source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = $color
    blur_passes = 1
    blur_size = 1
}

# --- ANIMATIONS ---
animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    
    # Global Fades
    animation = fadeIn, 1, 4, overshot
    animation = fadeOut, 1, 4, overshot
    
    # Input Field Specific
    animation = inputFieldColors, 1, 5, overshot # Smooth color transitions
    animation = inputFieldWidth, 1, 5, overshot  # Subtle width bounce on focus
    animation = inputFieldDots, 1, 6, overshot   # Smooth dot appearance
}
# --- THE GLASS CARD ---
shape {
    monitor =
    size = 900, 900
    # Using a neutral translucent white for the "glass" body 
    # This ensures it remains see-through regardless of the theme colors
    color = rgba(255, 255, 255, 0.15) 
    rounding = 100
    border_size = 2
    # Uses your theme's font color for the border so it "pops" on any theme
    border_color = $font_color
    
    shadow_passes = 0 # Removed for a cleaner glass look

    position = 700, 0
    halign = center
    valign = center
}

# --- EDITORIAL CLOCK ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = $font_color
    font_size = 220
    font_family = Inter Display ExtraBold
    position = 80, -80
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = $font_color
    font_size = 220
    font_family = Inter Display Thin
    position = 80, -330
    halign = left
    valign = top
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = $font_color
    font_size = 42
    font_family = Inter Display Light
    position = 95, -640 
    halign = left
    valign = top
}

# --- CARD CONTENT ---
image {
    monitor =
    path = ~/profile_image.jpg
    size = 300 
    rounding = 100
    border_size = 4
    border_color = $font_color
    
    position = 700, 200 
    halign = center
    valign = center
}

label {
    monitor =
    text = Prajwal Prathiksh
    font_size = 38
    font_family = Inter Display 
    color = $font_color
    
    position = 700, 0 
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 120
    outline_thickness = 30
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    
    outer_color = rgba(0, 0, 0, 0) # Made transparent to avoid double-borders
    inner_color = rgba(255, 255, 255, 0.2)
    font_color = $font_color
    font_family = Inter Display 
    
    fade_on_empty = false
    rounding = -1 
    
    # Adaptive placeholder color
    placeholder_text = Lockscreen Secured
    check_color = $check_color
    fail_color = rgb(204, 34, 34)

    position = 700, -210 
    halign = center
    valign = center
}

# --- MUSIC & STATUS ---
label {
    monitor =
    text = cmd[update:2000] echo "$(~/.config/hypr/scripts/nowplaying.sh)" 
    color = $font_color
    font_size = 30
    font_family = Inter Display
    position = 80, 100
    halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:5000] echo "$(~/.config/hypr/scripts/battery-status.sh)"
    color = $font_color
    font_size = 30
    font_family = Inter Display
    position = 80, 40
    halign = left
    valign = bottom
}