source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
    fail_timeout = 2000
}

# --- BACKGROUND ---
background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = $color
    blur_passes = 0
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
}

# --- THE GLASS SIDEBAR (SHAPE) ---
shape {
    monitor =
    size = 560, 100% # Optimized width for 2.7K high-density layout
    color = rgba(255, 255, 255, 0.1) 
    rounding = 0
    border_size = 0
    position = 0, 0
    halign = right
    valign = center
    zindex = 0
    
    # Layered Glass Shadow
    shadow_passes = 2
    shadow_size = 20
    shadow_color = rgba(0,0,0,0.3)
}

# --- EDITORIAL CLOCK (BACKGROUND) ---
# Massive Hour label
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = $font_color
    font_size = 260
    font_family = Inter Display ExtraBold
    position = 100, 150
    halign = left
    valign = center
    zindex = -1 # Sits behind the glass sidebar for depth
}

# Massive Minute label (Light weight for contrast)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = $font_color
    font_size = 260
    font_family = Inter Display Light
    position = 100, -150
    halign = left
    valign = center
    zindex = -1
}

# --- WEATHER & DATE (TOP RIGHT OF PANEL) ---
label {
    monitor =
    # Live weather integration from your waybar script
    text = cmd[update:600000] echo "<b>$(~/.config/waybar/scripts/weather.sh)</b>"
    color = $font_color
    font_size = 50
    font_family = Inter Display
    position = -60, -60 
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:600000] echo "$(date +"%A, %d %B")"
    color = $font_color
    font_size = 30
    font_family = Inter Display Light
    position = -60, -140 
    halign = right
    valign = top
}

# --- PROFILE IMAGE & NAME ---
image {
    monitor =
    path = ~/profile_image.jpg
    size = 200
    rounding = 70
    border_size = 3
    border_color = $outer_color
    position = -180, 180
    halign = right
    valign = center
}

label {
    monitor =
    text = Prajwal Prathiksh
    color = $font_color
    font_size = 44
    font_family = Inter Display Thin
    position = -80, 0
    halign = right
    valign = center
}

# --- INPUT FIELD (BOTTOM OF PANEL) ---
input-field {
    monitor =
    size = 400, 100
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    
    outer_color = $outer_color
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = $font_color
    font_family = Inter Display Light
    
    fade_on_empty = true
    rounding = 25 # Standardized 3D pod rounding
    
    placeholder_text = Welcome Back
    check_color = $check_color
    fail_color = rgb(204, 34, 34)

    position = -80, -220 
    halign = right
    valign = center
}

# --- MUSIC & STATUS (FOOTER) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/nowplaying.sh)"
    color = $font_color
    font_size = 30
    font_family = Inter Display Light
    position = 60, 50
    halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:5000] echo "$(~/.config/hypr/scripts/battery-status.sh)"
    color = $font_color
    font_size = 30
    font_family = Inter Display Light
    position = -60, 50
    halign = right
    valign = bottom
}